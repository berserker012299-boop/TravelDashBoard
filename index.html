<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Dashboard</title>
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        <h1>Travel Dashboard</h1>
    </header>

    <main>
        <!-- seleccionar ciudad -->
         <section class="seccion">
            <label for="city-select">Selecciona una ciudad:</label>

                <select id="city-select">
                    <option value="">Elige una ciudad</option>
                    <option value="barcelona">🇪🇸 Barcelona</option>
                    <option value="london">🇬🇧 London</option>
                    <option value="paris">🇫🇷 Paris</option>
                    <option value="new_york">🇺🇸 New York</option>
                    <option value="tokyo">🇯🇵 Tokyo</option>
                </select>
         </section>

        <!-- Dashboard (oculto hasta elegir ciudad) -->
         <div id="dashboard" class="hidden">
            <section class="card">
                    <h2>Resumen del destino</h2>

                    <p><strong>Ciudad:</strong> <span id="nombre-ciudad">—</span></p>
                    <p><strong>País:</strong> <span id="pais-ciudad">—</span></p>
                    <p><strong>Temperatura:</strong> <span id="temp-resumen">—</span></p>
                    <p><strong>Moneda local:</strong> <span id="moneda-ciudad">—</span></p>
                </section>
         </div>

         <!-- Widget del tiempo -->
        <section class="card">
            <h2>Meteorología</h2>

            <p><strong>Temperatura:</strong> <span id="temperatura">—</span></p>
            <p><strong>Prob. de lluvia:</strong> <span id="lluvia">—</span></p>
            <p><strong>Estado:</strong> <span id="estado-lluvia">—</span></p>
        </section>

        <section class="card">
            <h2>Conversión de moneda</h2>

            <label for="cantidad-eur">Cantidad en EUR:</label>
            <input type="number" id="cantidad-eur" value="100" min="0" />

            <button id="btn-convertir">Convertir</button>

            <p id="resultado-conversion"></p>
        </section>

        <!-- Mensaje de recomendación -->
        <section class="card">
            <h2>Recomendación</h2>

            <p id="mensaje">—</p>
        </section>

    </main>
    
</body>
</html>
